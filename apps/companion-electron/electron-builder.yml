appId: com.chunlv.companion
productName: 蠢驴电竞
directories:
  output: release
win:
  icon: public/donkey.ico
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: 蠢驴电竞陪玩
  installerIcon: public/donkey.ico
  uninstallerIcon: public/donkey.ico
  installerHeaderIcon: public/donkey.ico
  include: build/installer.nsh
extraResources:
  - from: src/assets/
    to: assets/
